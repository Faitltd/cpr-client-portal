apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cliq-service
  annotations:
    # Enable session affinity so Socket.IO clients reconnect to the same instance
    run.googleapis.com/sessionAffinity: "true"
    # Allow Cloud Storage FUSE volume mounts
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Keep at least 1 instance alive to preserve active WebSocket connections
        autoscaling.knative.dev/minScale: "1"
        # SQLite is single-writer; increase only if you migrate to a shared volume
        # with WAL mode and accept concurrent-read limitations.
        autoscaling.knative.dev/maxScale: "1"
        # Required to mount Cloud Storage via GCS FUSE
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: cliq-service-sa@PROJECT_ID.iam.gserviceaccount.com  # replace PROJECT_ID
      volumes:
        # GCS bucket mounted at /app/data for SQLite persistence.
        # Bucket must exist and the service account needs roles/storage.objectAdmin.
        - name: sqlite-data
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: false
            volumeAttributes:
              bucketName: YOUR_BUCKET_NAME   # replace with actual bucket name
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/cliq-service:latest  # replace placeholders
          ports:
            - containerPort: 3001
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
          env:
            # Plain env vars
            - name: PORT
              value: "3001"
            - name: ZOHO_API_DOMAIN
              value: https://www.zohoapis.com
            - name: ALLOWED_ORIGINS
              value: https://portal.cpr-renovations.com
            - name: ALLOW_CHANNEL_CREATE
              value: "false"
            - name: SQLITE_DB_PATH
              value: /app/data/messages.db
            # Secrets — create these in Secret Manager before deploying:
            #   gcloud secrets create ZOHO_CLIENT_ID --replication-policy=automatic
            #   echo -n "VALUE" | gcloud secrets versions add ZOHO_CLIENT_ID --data-file=-
            - name: ZOHO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ZOHO_CLIENT_ID
                  key: latest
            - name: ZOHO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ZOHO_CLIENT_SECRET
                  key: latest
            - name: ZOHO_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ZOHO_REFRESH_TOKEN
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
