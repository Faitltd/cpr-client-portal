steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/cpr-cliq-bridge:$SHORT_SHA", "."]
    dir: cliq-service

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/cpr-cliq-bridge:$SHORT_SHA"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "cpr-cliq-bridge"
      - "--image=gcr.io/$PROJECT_ID/cpr-cliq-bridge:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--memory=512Mi"
      - "--min-instances=1"
      - "--max-instances=3"
      - "--session-affinity"
      - "--port=3001"
      - "--set-env-vars=NODE_ENV=production"
      - "--set-secrets=ZOHO_CLIENT_ID=zoho-client-id:latest,ZOHO_CLIENT_SECRET=zoho-client-secret:latest,ZOHO_REFRESH_TOKEN=zoho-refresh-token:latest,JWT_SECRET=jwt-secret:latest"

images:
  - "gcr.io/$PROJECT_ID/cpr-cliq-bridge:$SHORT_SHA"
